services:
  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow_artifacts:/mlflow_artifacts
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlflow_artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - mlops_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
  # Authorization service
  auth_service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: auth_service
    ports:
      - "5004:5004"
    volumes:
      - ./data:/app/data
    networks:
      - mlops_network
    restart: unless-stopped
  # Data Service
  data_service:
    build:
      context: .
      dockerfile: services/data_service/Dockerfile
    container_name: data_service
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
    environment:
      - DATA_PATH=/app/data
      - PREPROCESSED_PATH=/app/data/preprocessed
    networks:
      - mlops_network
    depends_on:
      - mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Training Service
  training_service:
    build:
      context: .
      dockerfile: services/training_service/Dockerfile
    container_name: training_service
    ports:
      - "5002:5002"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PREPROCESSED_PATH=/app/data/preprocessed
      - MODELS_PATH=/app/models
    networks:
      - mlops_network
    depends_on:
      - mlflow
      - data_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prediction Service
  prediction_service:
    build:
      context: .
      dockerfile: services/prediction_service/Dockerfile
    container_name: prediction_service
    ports:
      - "5003:5003"
    volumes:
      - ./models:/app/models
      - ./src:/app/src
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODELS_PATH=/app/models
    networks:
      - mlops_network
    depends_on:
      - mlflow
      - training_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway
  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      - DATA_SERVICE_URL=http://data_service:5001
      - TRAINING_SERVICE_URL=http://training_service:5002
      - PREDICTION_SERVICE_URL=http://prediction_service:5003
      - MLFLOW_URL=http://mlflow:5000
    networks:
      - mlops_network
    depends_on:
      - data_service
      - training_service
      - prediction_service
      - mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

# Airflow metadata DB
  airflow-db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - mlops_network

  # Airflow init (runs once to create DB tables and admin user)
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_init
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    entrypoint: >
      bash -c "airflow db migrate && airflow users create
        --username admin --password admin
        --firstname Admin --lastname User
        --role Admin --email admin@example.com"
    networks:
      - mlops_network

  # Airflow Webserver (UI)
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_webserver
    depends_on:
      - airflow-db
      - airflow-init
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    command: webserver
    networks:
      - mlops_network
    restart: unless-stopped

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_scheduler
    depends_on:
      - airflow-db
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    command: scheduler
    networks:
      - mlops_network
    restart: unless-stopped
    
  # UI
  ui:
    image: nginx:alpine
    container_name: rakproj_ui
    ports:
      - "8082:80"
    volumes:
      - ./services/ui:/usr/share/nginx/html
    networks:
      - mlops_network
    depends_on:
      - api_gateway  

networks:
  mlops_network:
    driver: bridge

volumes:
  mlruns:
  mlflow_artifacts:
  airflow_db_data:
