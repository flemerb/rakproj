services:

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow_artifacts:/mlflow_artifacts
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlflow_artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - mlops_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Authorization Service
  auth_service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: auth_service
    ports:
      - "5004:5004"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/users.db
      - GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - mlops_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Data Service
  data_service:
    build:
      context: .
      dockerfile: services/data_service/Dockerfile
    container_name: data_service
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
    environment:
      - DATA_PATH=/app/data
      - PREPROCESSED_PATH=/app/data/preprocessed
    networks:
      - mlops_network
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Training Service
  training_service:
    build:
      context: .
      dockerfile: services/training_service/Dockerfile
    container_name: training_service
    ports:
      - "5002:5002"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PREPROCESSED_PATH=/app/data/preprocessed
      - MODELS_PATH=/app/models
    networks:
      - mlops_network
    depends_on:
      mlflow:
        condition: service_healthy
      data_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prediction Service
  prediction_service:
    build:
      context: .
      dockerfile: services/prediction_service/Dockerfile
    container_name: prediction_service
    ports:
      - "5003:5003"
    volumes:
      - ./models:/app/models
      - ./src:/app/src
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODELS_PATH=/app/models
    networks:
      - mlops_network
    depends_on:
      mlflow:
        condition: service_healthy
      training_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # API Gateway
  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      - DATA_SERVICE_URL=http://data_service:5001
      - TRAINING_SERVICE_URL=http://training_service:5002
      - PREDICTION_SERVICE_URL=http://prediction_service:5003
      - AUTH_SERVICE_URL=http://auth_service:5004
      - MLFLOW_URL=http://mlflow:5000
      - AIRFLOW_URL=http://airflow-webserver:8080
      - AIRFLOW_USER=${AIRFLOW_USER:-admin}
      - AIRFLOW_PASS=${AIRFLOW_PASS:-admin}
    networks:
      - mlops_network
    depends_on:
      auth_service:
        condition: service_healthy
      data_service:
        condition: service_healthy
      training_service:
        condition: service_healthy
      prediction_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Airflow metadata DB
  airflow-db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - mlops_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Airflow init (runs once to create DB tables and admin user)
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    entrypoint: >
      bash -c "airflow db migrate && airflow users create
        --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
        --firstname Admin --lastname User
        --role Admin --email admin@example.com"
    networks:
      - mlops_network
    restart: on-failure

  # Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_webserver
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    command: webserver
    networks:
      - mlops_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
    command: scheduler
    networks:
      - mlops_network
    restart: unless-stopped

  # UI
  ui:
    image: nginx:alpine
    container_name: rakproj_ui
    ports:
      - "8082:80"
    volumes:
      - ./services/ui:/usr/share/nginx/html
    networks:
      - mlops_network
    depends_on:
      api_gateway:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - mlops_network
    depends_on:
      api_gateway:
        condition: service_healthy
      data_service:
        condition: service_healthy
      training_service:
        condition: service_healthy
      prediction_service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Grafana
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - mlops_network
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mlops_network:
    driver: bridge

volumes:
  mlruns:
  mlflow_artifacts:
  airflow_db_data:
  prometheus_data:
  grafana_data: