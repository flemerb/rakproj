name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ services/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check no large model files are committed
        run: |
          find . -name "*.h5" -o -name "*.pkl" | grep -v ".git" | while read f; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 10485760 ]; then
              echo "Large file detected: $f ($size bytes) — should not be committed"
              exit 1
            fi
          done

      - name: Run unit tests
        run: |
          pytest tests/test_features.py tests/test_models.py tests/test_data.py -v

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - name: api_gateway
            dockerfile: services/api_gateway/Dockerfile
          - name: prediction_service
            dockerfile: services/prediction_service/Dockerfile
          - name: training_service
            dockerfile: services/training_service/Dockerfile
          - name: data_service
            dockerfile: services/data_service/Dockerfile
          - name: auth_service
            dockerfile: services/auth_service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (smoke test)
        run: |
          docker build -f ${{ matrix.service.dockerfile }} -t ${{ matrix.service.name }}:test .

      - name: Health check smoke test
        run: |
          docker run -d --name ${{ matrix.service.name }}_test -p 5099:5001 ${{ matrix.service.name }}:test || true
          sleep 5
          docker ps
          docker rm -f ${{ matrix.service.name }}_test || true