name: CI Pipeline

on:
  push:
    branches: ["main", "anas/*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: pytest tests/

    - name: Check no large model files committed
      run: |
        # Fail if .h5 or .pkl files larger than 10MB are in the repo
        find . -name "*.h5" -size +10M -not -path "./.venv*" | grep . && echo "ERROR: Large model files found" && exit 1 || true

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -f services/api_gateway/Dockerfile -t rakproj-api-gateway .
        docker build -f services/data_service/Dockerfile -t rakproj-data-service .
        docker build -f services/training_service/Dockerfile -t rakproj-training-service .
        docker build -f services/prediction_service/Dockerfile -t rakproj-prediction-service .
        docker build -f services/auth_service/Dockerfile -t rakproj-auth-service .
