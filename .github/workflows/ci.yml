name: CI Pipeline

on:
  push:
    branches: ["main", "anas/*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: pytest tests/

    - name: Check no large model files committed
      run: |
        # Fail if .h5 or .pkl files larger than 10MB are in the repo
        find . -name "*.h5" -size +10M -not -path "./.venv*" | grep . && echo "ERROR: Large model files found" && exit 1 || true

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -f services/api_gateway/Dockerfile -t rakproj-api-gateway .
        docker build -f services/data_service/Dockerfile -t rakproj-data-service .
        docker build -f services/training_service/Dockerfile -t rakproj-training-service .
        docker build -f services/prediction_service/Dockerfile -t rakproj-prediction-service .
        docker build -f services/auth_service/Dockerfile -t rakproj-auth-service .
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Set up DVC remote credentials
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull preprocessed data from DagsHub
        run: dvc pull data/preprocessed

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ services/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check no large model files are committed
        run: |
          find . -name "*.h5" -o -name "*.pkl" | grep -v ".git" | while read f; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt 10485760 ]; then
              echo "Large file detected: $f ($size bytes) — should not be committed"
              exit 1
            fi
          done

      - name: Run unit tests
        run: |
          pytest tests/test_features.py tests/test_models.py tests/test_data.py -v

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - name: api_gateway
            dockerfile: services/api_gateway/Dockerfile
          - name: prediction_service
            dockerfile: services/prediction_service/Dockerfile
          - name: training_service
            dockerfile: services/training_service/Dockerfile
          - name: data_service
            dockerfile: services/data_service/Dockerfile
          - name: auth_service
            dockerfile: services/auth_service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (smoke test)
        run: |
          docker build -f ${{ matrix.service.dockerfile }} -t ${{ matrix.service.name }}:test .

      - name: Health check smoke test
        run: |
          docker run -d --name ${{ matrix.service.name }}_test -p 5099:5001 ${{ matrix.service.name }}:test || true
          sleep 5
          docker ps
          docker rm -f ${{ matrix.service.name }}_test || true
