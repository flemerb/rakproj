name: Build and Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io/flemerb

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - name: api_gateway
            dockerfile: services/api_gateway/Dockerfile
          - name: prediction_service
            dockerfile: services/prediction_service/Dockerfile
          - name: training_service
            dockerfile: services/training_service/Dockerfile
          - name: data_service
            dockerfile: services/data_service/Dockerfile
          - name: auth_service
            dockerfile: services/auth_service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get short git SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ steps.sha.outputs.short }}