name: Deploy to Staging

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io/flemerb
  SERVICES: "api_gateway prediction_service training_service data_service auth_service"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short git SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/rakproj
            export SHA=${{ steps.sha.outputs.short }}
            docker-compose pull
            docker-compose up -d --no-build

      - name: Run integration tests against staging
        run: |
          pip install pytest requests
          GATEWAY_URL=http://${{ secrets.STAGING_HOST }}:8080 \
          AUTH_URL=http://${{ secrets.STAGING_HOST }}:5004 \
          PREDICTION_URL=http://${{ secrets.STAGING_HOST }}:5003 \
          TRAINING_URL=http://${{ secrets.STAGING_HOST }}:5002 \
          DATA_URL=http://${{ secrets.STAGING_HOST }}:5001 \
          pytest tests/test_integration.py -v

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment failed for SHA ${{ steps.sha.outputs.short }}"
          # Add Slack/email notification here if needed